name: ACLClouds 自动续期

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  renew:
    name: 执行续期检测
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    timeout-minutes: 15

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 运行续期脚本
        env:
          ACLCLOUDS_EMAIL:    ${{ secrets.ACLCLOUDS_EMAIL }}
          ACLCLOUDS_PASSWORD: ${{ secrets.ACLCLOUDS_PASSWORD }}
          TG_BOT_TOKEN:       ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
          WXPUSHER_APPTOKEN:  ${{ secrets.WXPUSHER_APPTOKEN }}
          WXPUSHER_UID:       ${{ secrets.WXPUSHER_UID }}
        run: |
          python renew.py 2>&1 | tee renew.log

      - name: 上传截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aclclouds-debug
          path: screenshots/
          retention-days: 3

      - name: 删除当前 workflow 的旧 runs（保留最近2个）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[2:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done
