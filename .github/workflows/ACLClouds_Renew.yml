name: ACLClouds 自动续期

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 运行（北京时间 10:00）
  workflow_dispatch:       # 支持手动触发

jobs:
  renew:
    name: 执行续期检测
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 运行续期脚本
        env:
          ACLCLOUDS_EMAIL:    ${{ secrets.ACLCLOUDS_EMAIL }}
          ACLCLOUDS_PASSWORD: ${{ secrets.ACLCLOUDS_PASSWORD }}
          TG_BOT_TOKEN:       ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
          WXPUSHER_APPTOKEN:  ${{ secrets.WXPUSHER_APPTOKEN }}
          WXPUSHER_UID:       ${{ secrets.WXPUSHER_UID }}
        run: |
          python renew.py 2>&1 | tee renew.log

      - name: 上传截图（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aclclouds-screenshots
          path: screenshots/
          retention-days: 3
